version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dcmusic-backend
    ports:
      - "8080:8080"
    volumes:
      # Map the H2 local database and audio uploads to the host machine for persistence
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=default
      
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dcmusic-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
